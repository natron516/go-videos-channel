<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gospel Outreach — Video Admin</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff; padding: 40px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p.sub { color: #888; margin-bottom: 32px; }
  .asset { background: #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
  .thumb { width: 160px; height: 90px; object-fit: cover; border-radius: 8px; background: #333; flex-shrink: 0; }
  .info { flex: 1; }
  .title-input { background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; padding: 6px 10px; font-size: 14px; width: 100%; margin-bottom: 8px; box-sizing: border-box; }
  .row { display: flex; gap: 10px; align-items: center; }
  select { background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
  input[type=text] { background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; padding: 6px 10px; font-size: 14px; width: 180px; }
  button.save { background: #0a84ff; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 14px; cursor: pointer; }
  button.save:hover { background: #0070e0; }
  .status { font-size: 12px; color: #4cd964; margin-left: 8px; display: none; }
  .duration { color: #888; font-size: 12px; margin-top: 4px; }
  .login { max-width: 400px; margin: 80px auto; background: #2a2a2a; border-radius: 16px; padding: 40px; text-align: center; }
  .login input { width: 100%; margin: 8px 0; padding: 10px; border-radius: 8px; border: 1px solid #555; background: #333; color: #fff; font-size: 15px; box-sizing: border-box; }
  .login button { margin-top: 16px; width: 100%; padding: 12px; background: #0a84ff; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid #333; padding-bottom: 0; }
  .tab-btn { background: none; border: none; color: #888; font-size: 15px; font-weight: 600; padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab-btn.active { color: #fff; border-bottom-color: #0a84ff; }
  .tab-btn:hover:not(.active) { color: #ccc; }
  /* Feedback cards */
  .fb-card { background: #2a2a2a; border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; position: relative; }
  .fb-card.read { opacity: 0.45; }
  .fb-text { font-size: 15px; line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
  .fb-meta { font-size: 12px; color: #888; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .fb-badge { background: #333; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .fb-badge.ios { color: #5ac8fa; }
  .fb-badge.tvos { color: #bf5af2; }
  .fb-badge.ipados { color: #30d158; }
  .fb-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn-sm { background: #3a3a3a; color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
  .btn-sm:hover { background: #444; }
  .btn-sm.danger { color: #ff453a; }
  .btn-sm.danger:hover { background: #3a2020; }
  .unread-dot { width: 8px; height: 8px; background: #0a84ff; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .fb-empty { color: #555; text-align: center; padding: 60px 0; font-size: 15px; }
  #feedback-key-hint { color: #888; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>

<div id="login-screen" class="login">
  <h2>Gospel Outreach Admin</h2>
  <p style="color:#888">Enter your Mux credentials</p>
  <input id="tokenId" type="text" placeholder="Token ID" />
  <input id="secretKey" type="password" placeholder="Secret Key" />
  <button onclick="connect()">Connect</button>
  <p id="login-error" style="color:red;display:none">Invalid credentials</p>
</div>

<div id="main" style="display:none">
  <h1>Gospel Outreach — Admin</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('videos')">Videos</button>
    <button class="tab-btn" onclick="switchTab('feedback')" id="feedback-tab-btn">Feedback</button>
  </div>

  <!-- Videos tab -->
  <div id="tab-videos">
    <p class="sub">Set categories and titles for your videos. Changes sync to the app instantly.</p>
    <div id="assets"></div>
  </div>

  <!-- Feedback tab -->
  <div id="tab-feedback" style="display:none">
    <p class="sub">Suggestions submitted by app users.</p>
    <p id="feedback-key-hint"></p>
    <div id="feedback-list"><div class="fb-empty">Loading feedback…</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseApp = initializeApp({
  apiKey: "AIzaSyAIP7-0-Ciop8tK0yOLwcSJhvwW6jPSKEo",
  authDomain: "gospel-outreach-tv.firebaseapp.com",
  projectId: "gospel-outreach-tv",
  storageBucket: "gospel-outreach-tv.appspot.com",
  messagingSenderId: "419198793314",
  appId: "1:419198793314:ios:0f75087a30ce0f23da433b"
});
const db = getFirestore(firebaseApp);

let TOKEN_ID, SECRET_KEY;

const CATEGORIES = ['sermon','kids','music','performance'];
const CATEGORY_LABELS = { sermon:'Sermons', kids:"Children's", music:'Music Videos', performance:'Performances' };

async function connect() {
  TOKEN_ID = document.getElementById('tokenId').value.trim();
  SECRET_KEY = document.getElementById('secretKey').value.trim();
  const res = await muxGet('/video/v1/assets?limit=5');
  if (res.error) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  loadAssets();
}

async function muxGet(path) {
  const res = await fetch('https://api.mux.com' + path, {
    headers: { 'Authorization': 'Basic ' + btoa(TOKEN_ID + ':' + SECRET_KEY) }
  });
  return res.json();
}

async function muxPatch(path, body) {
  const res = await fetch('https://api.mux.com' + path, {
    method: 'PATCH',
    headers: {
      'Authorization': 'Basic ' + btoa(TOKEN_ID + ':' + SECRET_KEY),
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function loadAssets() {
  const data = await muxGet('/video/v1/assets?limit=100&order_direction=desc');
  const assets = (data.data || []).filter(a => a.status === 'ready');
  const container = document.getElementById('assets');
  container.innerHTML = '';
  assets.forEach(asset => {
    let pass = {};
    try { pass = JSON.parse(asset.passthrough || '{}'); } catch(e) {}
    const pid = asset.playback_ids?.[0]?.id;
    const thumb = pid ? `https://image.mux.com/${pid}/thumbnail.jpg?width=320&time=5` : '';
    const dur = asset.duration ? formatDur(asset.duration) : '';

    const el = document.createElement('div');
    el.className = 'asset';
    el.innerHTML = `
      ${thumb ? `<img class="thumb" src="${thumb}" onerror="this.style.background='#444';this.src=''">` : '<div class="thumb"></div>'}
      <div class="info">
        <input class="title-input" type="text" placeholder="Video title" value="${esc(pass.title || '')}" id="title-${asset.id}">
        <div class="row">
          <input type="text" placeholder="Speaker (optional)" value="${esc(pass.speaker || '')}" id="speaker-${asset.id}" style="width:160px">
          <select id="cat-${asset.id}">
            <option value="">— Category —</option>
            ${CATEGORIES.map(c => `<option value="${c}" ${pass.category===c?'selected':''}>${CATEGORY_LABELS[c]}</option>`).join('')}
          </select>
          <button class="save" onclick="save('${asset.id}')">Save</button>
          <span class="status" id="status-${asset.id}">✓ Saved</span>
        </div>
        ${dur ? `<div class="duration">${dur}</div>` : ''}
      </div>`;
    container.appendChild(el);
  });
}

async function save(id) {
  const title = document.getElementById(`title-${id}`).value.trim();
  const speaker = document.getElementById(`speaker-${id}`).value.trim();
  const category = document.getElementById(`cat-${id}`).value;

  const pass = {};
  if (title) pass.title = title;
  if (speaker) pass.speaker = speaker;
  if (category) pass.category = category;

  await muxPatch(`/video/v1/assets/${id}`, { passthrough: JSON.stringify(pass) });

  const el = document.getElementById(`status-${id}`);
  el.style.display = 'inline';
  setTimeout(() => el.style.display = 'none', 2000);
}

function formatDur(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function esc(s) { return s.replace(/"/g,'&quot;'); }

// ---- Tab switching ----
function switchTab(tab) {
  document.getElementById('tab-videos').style.display = tab === 'videos' ? 'block' : 'none';
  document.getElementById('tab-feedback').style.display = tab === 'feedback' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'feedback') loadFeedback();
}

// ---- Feedback ----
let feedbackLoaded = false;

async function loadFeedback() {
  const container = document.getElementById('feedback-list');
  container.innerHTML = '<div class="fb-empty">Loading…</div>';
  try {
    const q = query(collection(db, 'feedback'), orderBy('timestamp', 'desc'));
    const snap = await getDocs(q);
    if (snap.empty) {
      container.innerHTML = '<div class="fb-empty">No feedback yet — check back after users update to v1.5.2.</div>';
      return;
    }
    const unread = snap.docs.filter(d => !d.data().read).length;
    document.getElementById('feedback-tab-btn').textContent = unread > 0 ? `Feedback (${unread})` : 'Feedback';
    container.innerHTML = '';
    snap.docs.forEach(docSnap => {
      const d = docSnap.data();
      const ts = d.timestamp?.toDate ? d.timestamp.toDate().toLocaleString() : 'Unknown time';
      const platform = (d.platform || 'Unknown').toLowerCase();
      const badgeClass = platform === 'tvos' ? 'tvos' : platform === 'ipados' ? 'ipados' : 'ios';
      const card = document.createElement('div');
      card.className = 'fb-card' + (d.read ? ' read' : '');
      card.id = 'fb-' + docSnap.id;
      card.innerHTML = `
        <div class="fb-text">${d.read ? '' : '<span class="unread-dot"></span>'}${esc(d.text || '')}</div>
        <div class="fb-meta">
          <span>${ts}</span>
          <span class="fb-badge ${badgeClass}">${d.platform || 'Unknown'}</span>
          ${d.appVersion ? `<span class="fb-badge">v${esc(d.appVersion)}</span>` : ''}
        </div>
        <div class="fb-actions">
          ${!d.read ? `<button class="btn-sm" onclick="markRead('${docSnap.id}')">Mark as read</button>` : '<span style="color:#555;font-size:12px">Read</span>'}
          <button class="btn-sm danger" onclick="deleteFeedback('${docSnap.id}')">Delete</button>
        </div>`;
      container.appendChild(card);
    });
  } catch(e) {
    container.innerHTML = `<div class="fb-empty">Error loading feedback: ${e.message}</div>`;
  }
}

async function markRead(id) {
  await updateDoc(doc(db, 'feedback', id), { read: true });
  loadFeedback();
}

async function deleteFeedback(id) {
  if (!confirm('Delete this feedback?')) return;
  await deleteDoc(doc(db, 'feedback', id));
  loadFeedback();
}

window.switchTab = switchTab;
window.markRead = markRead;
window.deleteFeedback = deleteFeedback;
</script>
</body>
</html>
